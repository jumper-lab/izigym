server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Cache agressivo para assets versionados pelo Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy reverso para a API EVO (replica o proxy do vite.config.ts em produção)
    location /api-evo/ {
        proxy_pass https://evo-integracao-api.w12app.com.br/;
        proxy_http_version 1.1;
        proxy_set_header Host evo-integracao-api.w12app.com.br;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_name evo-integracao-api.w12app.com.br;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback — qualquer rota desconhecida cai no index.html (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Não logar favicon/robots ausentes
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }
}
